[custom]

;========================
; 规则集
;========================

; AI 规则集 - 使用你 fork 的仓库
ruleset=🤖 AI,https://raw.githubusercontent.com/FxStar/clash-ai-rules/master/ALL-AI.list


ruleset=🍎 Apple,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list

ruleset=🪟 Microsoft,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list

ruleset=🎯 全球直连,[]GEOSITE,CN
ruleset=🎯 全球直连,[]GEOIP,CN,no-resolve

ruleset=🐟 漏网之鱼,[]FINAL


;========================
; 策略组
;========================

custom_proxy_group=🚀 节点选择`select`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇲 美国节点`[]🌐 其他地区`[]DIRECT

custom_proxy_group=🤖 AI`select`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇭🇰 香港节点`[]🌐 其他地区

custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🚀 节点选择

custom_proxy_group=🪟 Microsoft`select`[]🚀 节点选择`[]DIRECT

custom_proxy_group=🎯 全球直连`select`[]DIRECT

custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]🚀 节点选择


;========================
; 节点分类
;========================

custom_proxy_group=🇭🇰 香港节点`select`(香港|HK|Hong Kong|🇭🇰)

custom_proxy_group=🇯🇵 日本节点`select`(日本|JP|Japan|东京|大阪|川日|泉日|埼玉)

custom_proxy_group=🇸🇬 新加坡节点`select`(新加坡|狮城|SG|Singapore)

custom_proxy_group=🇺🇲 美国节点`select`(美国|US|United States|洛杉矶|圣何塞|硅谷|西雅图|达拉斯|波特兰|俄勒冈|凤凰城|芝加哥)

custom_proxy_group=🌐 其他地区`select`(^(?!.*(香港|HK|Hong Kong|🇭🇰|日本|JP|Japan|东京|大阪|川日|泉日|埼玉|新加坡|狮城|SG|Singapore|美国|US|United States|洛杉矶|圣何塞|硅谷|西雅图|达拉斯|波特兰|俄勒冈|凤凰城|芝加哥)).*)


;========================
; 开启规则生成
;========================

enable_rule_generator=true
overwrite_original_rules=true
